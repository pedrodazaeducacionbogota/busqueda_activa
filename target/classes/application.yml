server:
  port: 8080

spring:
  application:
    name: busqueda-activa
  main:
    allow-bean-definition-overriding: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: jdbc:mysql://localhost:3306/sed_cobertura?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  level:
    org.springframework.web: INFO
    org.hibernate: INFO

jwt:
  secret: s3cr3tM1cr0S3rv1c10Bvsqu3d4
  expiration: 86400000 # 24 hours
