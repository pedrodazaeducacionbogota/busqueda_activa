# ===============================
# CONFIGURACION BASE (comun a todos los perfiles)
# ===============================
spring.application.name=sicobertura-busqueda-activa
logging.level.root=info

# Perfil activo por defecto (dev o prod)
spring.profiles.active=${SPRING_PROFILE:dev}

# ===============================
# JPA / HIBERNATE (comun)
# ===============================
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.javax.persistence.validation.mode=none
spring.main.allow-bean-definition-overriding=true

# ===============================
# SWAGGER / SPRINGDOC
# ===============================
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
server.forward-headers-strategy=framework
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ===============================
# JWT - TOKEN_KEY y EXPIRACION_TOKEN se leen de tabla configuracion en BD
# ===============================

# ===============================
# PERMISOS - PermissionInterceptor de commons
# ===============================
app.security.enabled=${SECURITY_ENABLED:false}
app.security.permission=GLOBAL

# ===============================
# CORS
# ===============================
cors.allowed-origins=${CORS_ORIGINS:*}

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
