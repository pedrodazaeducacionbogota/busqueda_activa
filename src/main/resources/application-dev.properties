# ===============================
# PERFIL DEV - MySQL + Datasource directo
# Para Docker (AWS) y desarrollo local
# ===============================

# DATASOURCE - MySQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER_NAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / HIBERNATE
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.MySQL8Dialect}
spring.jpa.hibernate.ddl-auto=${DDL:none}

# Puerto
server.port=${SERVER_PORT:8086}

# LOG SQL (opcional desarrollo)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
